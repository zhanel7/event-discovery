name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=migrations,__pycache__ --extend-ignore=E203,W503

      - name: Unit and integration tests
        run: pytest test_unit.py test_integration.py -v --tb=short
        env:
          JWT_SECRET_KEY: ci-test-secret-key-32-bytes-minimum
          REDIS_URL: redis://127.0.0.1:59999/0

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t event-discovery-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t event-discovery-frontend:latest ./frontend --build-arg VITE_API_URL=http://localhost:8000

      # Раскомментируйте и задайте секреты для публикации в Docker Hub
      - name: Login to Docker Hub (optional)
        if: ${{ false }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push images (optional)
        if: ${{ false }}
        run: |
          docker tag event-discovery-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/event-discovery-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/event-discovery-backend:latest

  deploy-render:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render (optional)
        if: ${{ false }}
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
